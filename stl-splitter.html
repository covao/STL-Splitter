<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STL Splitter</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;700&display=swap');

  :root {
    --bg-primary: #0d0f12;
    --bg-secondary: #151820;
    --bg-tertiary: #1c2030;
    --bg-hover: #252a3a;
    --border: #2a3045;
    --text-primary: #e8ecf4;
    --text-secondary: #8892a8;
    --text-muted: #5a6580;
    --accent: #4ecdc4;
    --accent-dim: #2a7a74;
    --danger: #ff6b6b;
    --warning: #ffd93d;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', 'JetBrains Mono', sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
    z-index: 10;
    flex-shrink: 0;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-icon {
    width: 28px; height: 28px;
    background: var(--accent);
    clip-path: polygon(50% 0%, 100% 38%, 82% 100%, 18% 100%, 0% 38%);
  }

  .logo h1 {
    font-family: 'JetBrains Mono', monospace;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-primary);
  }

  .logo span {
    color: var(--accent);
  }

  .header-info {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    display: flex;
    gap: 20px;
  }

  .header-info .val { color: var(--accent); }

  .main-container {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* Sidebar */
  .sidebar {
    width: 320px;
    min-width: 320px;
    background: var(--bg-secondary);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .sidebar-header {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  .sidebar-header h2 {
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-secondary);
  }

  .object-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    background: var(--bg-tertiary);
    padding: 3px 10px;
    border-radius: 10px;
    color: var(--accent);
    border: 1px solid var(--border);
  }

  .object-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
  }

  .object-list::-webkit-scrollbar { width: 4px; }
  .object-list::-webkit-scrollbar-track { background: transparent; }
  .object-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .object-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s;
    margin-bottom: 2px;
    border: 1px solid transparent;
  }

  .object-item:hover {
    background: var(--bg-hover);
    border-color: var(--border);
  }

  .object-item.highlighted {
    background: var(--bg-hover);
    border-color: var(--accent-dim);
  }

  .object-item .color-dot {
    width: 14px; height: 14px;
    border-radius: 3px;
    flex-shrink: 0;
    box-shadow: 0 0 6px rgba(0,0,0,0.4);
  }

  .object-item .checkbox {
    width: 18px; height: 18px;
    border: 2px solid var(--border);
    border-radius: 4px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    cursor: pointer;
  }

  .object-item .checkbox.checked {
    background: var(--accent);
    border-color: var(--accent);
  }

  .object-item .checkbox.checked::after {
    content: '✓';
    font-size: 12px;
    font-weight: 700;
    color: var(--bg-primary);
  }

  .object-item .info {
    flex: 1;
    min-width: 0;
  }

  .object-item .name {
    font-size: 13px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .object-item .meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    margin-top: 2px;
  }

  .sidebar-actions {
    padding: 12px;
    border-top: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 8px;
    flex-shrink: 0;
  }

  .btn-row {
    display: flex;
    gap: 8px;
  }

  .btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.5px;
    padding: 10px 14px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--bg-tertiary);
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.15s;
    flex: 1;
    text-align: center;
  }

  .btn:hover { background: var(--bg-hover); color: var(--text-primary); border-color: var(--text-muted); }

  .btn-primary {
    background: var(--accent);
    color: var(--bg-primary);
    border-color: var(--accent);
  }

  .btn-primary:hover { background: #5ee0d6; border-color: #5ee0d6; color: var(--bg-primary); }

  .btn-primary:disabled {
    opacity: 0.35;
    cursor: not-allowed;
    background: var(--accent-dim);
    border-color: var(--accent-dim);
  }

  /* Viewport */
  .viewport {
    flex: 1;
    position: relative;
    background: var(--bg-primary);
  }

  #canvas-container {
    width: 100%;
    height: 100%;
  }

  #canvas-container canvas {
    display: block;
  }

  /* Drop zone overlay */
  .drop-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 20;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .drop-overlay.visible {
    opacity: 1;
    pointer-events: auto;
  }

  .drop-overlay.active .drop-zone-inner {
    border-color: var(--accent);
    background: rgba(78, 205, 196, 0.08);
  }

  /* Empty state */
  .empty-state {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 5;
    cursor: pointer;
  }

  .empty-state.hidden { display: none; }

  .drop-zone-inner {
    border: 2px dashed var(--border);
    border-radius: 16px;
    padding: 60px 80px;
    text-align: center;
    transition: all 0.25s;
  }

  .drop-zone-inner:hover {
    border-color: var(--text-muted);
    background: rgba(255,255,255,0.02);
  }

  .drop-icon {
    font-size: 48px;
    margin-bottom: 16px;
    opacity: 0.6;
  }

  .drop-title {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 6px;
    color: var(--text-primary);
  }

  .drop-subtitle {
    font-size: 12px;
    color: var(--text-muted);
  }

  .drop-subtitle span {
    color: var(--accent);
    text-decoration: underline;
    cursor: pointer;
  }

  /* Viewport controls */
  .viewport-controls {
    position: absolute;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 4px;
    background: var(--bg-secondary);
    padding: 4px;
    border-radius: 8px;
    border: 1px solid var(--border);
    z-index: 10;
  }

  .viewport-controls button {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    padding: 6px 12px;
    background: transparent;
    border: none;
    color: var(--text-secondary);
    border-radius: 5px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .viewport-controls button:hover { background: var(--bg-hover); color: var(--text-primary); }
  .viewport-controls button.active { background: var(--accent-dim); color: var(--accent); }

  /* Axis indicator */
  #axis-canvas {
    position: absolute;
    bottom: 16px;
    right: 16px;
    z-index: 10;
    pointer-events: none;
  }

  /* Status bar */
  .statusbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 16px;
    background: var(--bg-secondary);
    border-top: 1px solid var(--border);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    flex-shrink: 0;
  }

  /* Progress */
  .progress-overlay {
    position: absolute;
    inset: 0;
    background: rgba(13,15,18,0.85);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 50;
  }

  .progress-overlay.hidden { display: none; }

  .progress-bar-container {
    width: 240px;
    height: 3px;
    background: var(--bg-tertiary);
    border-radius: 2px;
    overflow: hidden;
    margin-top: 12px;
  }

  .progress-bar-fill {
    height: 100%;
    background: var(--accent);
    width: 0%;
    transition: width 0.3s;
  }

  .progress-text {
    font-size: 13px;
    color: var(--text-secondary);
  }

  /* Tooltip */
  .tooltip {
    position: fixed;
    padding: 6px 10px;
    background: var(--bg-tertiary);
    border: 1px solid var(--border);
    border-radius: 4px;
    font-size: 11px;
    color: var(--text-primary);
    pointer-events: none;
    z-index: 100;
    display: none;
  }

  /* File input hidden */
  #file-input { display: none; }

  /* Settings for separation */
  .settings-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 12px;
    font-size: 11px;
    color: var(--text-secondary);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .settings-row label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .settings-row input[type="number"] {
    width: 70px;
    padding: 4px 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    background: var(--bg-tertiary);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text-primary);
    outline: none;
  }

  .settings-row input[type="number"]:focus {
    border-color: var(--accent);
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon"></div>
    <h1>STL <span>Splitter</span></h1>
  </div>
  <div class="header-info">
    <span>Triangles: <span class="val" id="info-tris">—</span></span>
    <span>Objects: <span class="val" id="info-objs">—</span></span>
    <span>File: <span class="val" id="info-file">—</span></span>
  </div>
</header>

<div class="main-container">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h2>Objects</h2>
      <span class="object-count" id="obj-count">0</span>
    </div>
    <div class="settings-row">
      <label title="Vertices closer than this distance are treated as identical">Merge tolerance</label>
      <input type="number" id="tolerance-input" value="0.001" step="0.001" min="0">
    </div>
    <div class="object-list" id="object-list"></div>
    <div class="sidebar-actions">
      <div class="btn-row">
        <button class="btn" id="btn-select-all">Select All</button>
        <button class="btn" id="btn-deselect-all">Deselect All</button>
      </div>
      <button class="btn btn-primary" id="btn-export" disabled>Export Selected as STL</button>
      <button class="btn" id="btn-export-separate" disabled>Export Each as STL</button>
    </div>
  </div>

  <div class="viewport" id="viewport">
    <div id="canvas-container"></div>

    <div class="empty-state" id="empty-state" onclick="document.getElementById('file-input').click()">
      <div class="drop-zone-inner">
        <div class="drop-icon">⬡</div>
        <div class="drop-title">Drag & Drop an STL File</div>
        <div class="drop-subtitle">or <span>click to browse</span></div>
      </div>
    </div>

    <div class="drop-overlay" id="drop-overlay">
      <div class="drop-zone-inner">
        <div class="drop-icon">⬡</div>
        <div class="drop-title">Drop file here</div>
      </div>
    </div>

    <div class="progress-overlay hidden" id="progress-overlay">
      <div class="progress-text" id="progress-text">Loading...</div>
      <div class="progress-bar-container">
        <div class="progress-bar-fill" id="progress-bar"></div>
      </div>
    </div>

    <canvas id="axis-canvas" width="100" height="100"></canvas>

    <div class="viewport-controls" id="viewport-controls" style="display:none;">
      <button onclick="resetCamera()" title="Reset camera">Reset</button>
      <button onclick="toggleWireframe()" id="btn-wireframe">Wireframe</button>
      <button onclick="toggleGrid()" id="btn-grid" class="active">Grid</button>
    </div>
  </div>
</div>

<div class="statusbar">
  <span id="status-left">Drop an STL file to get started</span>
  <span id="status-right">Mouse: Rotate / Shift+Mouse: Pan / Scroll: Zoom</span>
</div>

<input type="file" id="file-input" accept=".stl">

<script>
// ==================== THREE.JS SCENE SETUP ====================
let scene, camera, renderer, meshGroup;
let isRotating = false, isPanning = false;
let rotStart = {x:0, y:0}, panStart = {x:0, y:0};
let spherical = { theta: Math.PI/4, phi: Math.PI/3, radius: 5 };
let target = new THREE.Vector3(0, 0, 0);
let gridHelper, axisHelper;
let showWireframe = false, showGrid = true;
let separatedObjects = [];
let selectedIndices = new Set();
let highlightedIndex = -1;
let currentFileName = '';

const OBJECT_COLORS = [
  0x4ecdc4, 0xff6b6b, 0xffd93d, 0x6c5ce7, 0xa8e6cf,
  0xfd79a8, 0xfdcb6e, 0x74b9ff, 0xe17055, 0x00cec9,
  0xb2bec3, 0xe84393, 0x55efc4, 0x81ecec, 0xfab1a0,
  0xdfe6e9, 0xf9ca24, 0x7ed6df, 0x22a6b3, 0xbadc58,
  0xf0932b, 0xeb4d4b, 0x6ab04c, 0x686de0, 0x30336b
];

function initScene() {
  scene = new THREE.Scene();

  camera = new THREE.PerspectiveCamera(45, 1, 0.01, 1000);
  updateCameraPosition();

  renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setClearColor(0x0d0f12, 1);
  renderer.shadowMap.enabled = false;

  const container = document.getElementById('canvas-container');
  container.appendChild(renderer.domElement);
  handleResize();

  // Lights
  const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
  scene.add(ambientLight);

  const dirLight1 = new THREE.DirectionalLight(0xffffff, 0.7);
  dirLight1.position.set(5, 10, 7);
  scene.add(dirLight1);

  const dirLight2 = new THREE.DirectionalLight(0x88aaff, 0.3);
  dirLight2.position.set(-5, -3, -5);
  scene.add(dirLight2);

  // Grid
  gridHelper = new THREE.GridHelper(20, 40, 0x2a3045, 0x1a1f2e);
  scene.add(gridHelper);

  meshGroup = new THREE.Group();
  scene.add(meshGroup);

  animate();
}

function handleResize() {
  const container = document.getElementById('canvas-container');
  const w = container.clientWidth;
  const h = container.clientHeight;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
}

function updateCameraPosition() {
  const sp = spherical;
  camera.position.set(
    target.x + sp.radius * Math.sin(sp.phi) * Math.sin(sp.theta),
    target.y + sp.radius * Math.cos(sp.phi),
    target.z + sp.radius * Math.sin(sp.phi) * Math.cos(sp.theta)
  );
  camera.lookAt(target);
}

function resetCamera() {
  if (meshGroup.children.length === 0) return;
  const box = new THREE.Box3().setFromObject(meshGroup);
  const center = box.getCenter(new THREE.Vector3());
  const size = box.getSize(new THREE.Vector3()).length();
  target.copy(center);
  spherical = { theta: Math.PI/4, phi: Math.PI/3, radius: size * 1.2 };
  updateCameraPosition();
}

function toggleWireframe() {
  showWireframe = !showWireframe;
  document.getElementById('btn-wireframe').classList.toggle('active', showWireframe);
  meshGroup.children.forEach(mesh => {
    mesh.material.wireframe = showWireframe;
  });
}

function toggleGrid() {
  showGrid = !showGrid;
  document.getElementById('btn-grid').classList.toggle('active', showGrid);
  gridHelper.visible = showGrid;
}

function animate() {
  requestAnimationFrame(animate);
  renderer.render(scene, camera);
  drawAxisIndicator();
}

// ==================== AXIS INDICATOR ====================
function drawAxisIndicator() {
  const canvas = document.getElementById('axis-canvas');
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, 100, 100);

  const axes = [
    { dir: new THREE.Vector3(1,0,0), label: 'X', color: '#ff6b6b' },
    { dir: new THREE.Vector3(0,1,0), label: 'Y', color: '#4ecdc4' },
    { dir: new THREE.Vector3(0,0,1), label: 'Z', color: '#ffd93d' }
  ];

  const viewMat = new THREE.Matrix4().lookAt(camera.position, target, camera.up);
  const rotMat = new THREE.Matrix4().extractRotation(viewMat);

  const projected = axes.map(a => {
    const v = a.dir.clone().applyMatrix4(rotMat);
    return { x: v.x, y: -v.y, z: v.z, label: a.label, color: a.color };
  });

  projected.sort((a, b) => a.z - b.z);

  const cx = 50, cy = 50, len = 30;
  projected.forEach(p => {
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + p.x * len, cy + p.y * len);
    ctx.strokeStyle = p.color;
    ctx.lineWidth = 2;
    ctx.stroke();

    ctx.font = '600 11px JetBrains Mono, monospace';
    ctx.fillStyle = p.color;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(p.label, cx + p.x * (len + 12), cy + p.y * (len + 12));
  });
}

// ==================== MOUSE CONTROLS ====================
function setupControls() {
  const el = document.getElementById('canvas-container');

  el.addEventListener('mousedown', e => {
    if (e.shiftKey || e.button === 1 || e.button === 2) {
      isPanning = true;
      panStart = { x: e.clientX, y: e.clientY };
    } else {
      isRotating = true;
      rotStart = { x: e.clientX, y: e.clientY };
    }
    e.preventDefault();
  });

  window.addEventListener('mousemove', e => {
    if (isRotating) {
      const dx = e.clientX - rotStart.x;
      const dy = e.clientY - rotStart.y;
      spherical.theta -= dx * 0.005;
      spherical.phi = Math.max(0.05, Math.min(Math.PI - 0.05, spherical.phi + dy * 0.005));
      rotStart = { x: e.clientX, y: e.clientY };
      updateCameraPosition();
    }
    if (isPanning) {
      const dx = e.clientX - panStart.x;
      const dy = e.clientY - panStart.y;
      const right = new THREE.Vector3();
      const up = new THREE.Vector3();
      camera.getWorldDirection(new THREE.Vector3());
      right.crossVectors(camera.up, new THREE.Vector3().subVectors(camera.position, target).normalize()).normalize();
      up.copy(camera.up);
      const panSpeed = spherical.radius * 0.002;
      target.add(right.multiplyScalar(-dx * panSpeed));
      target.add(up.multiplyScalar(dy * panSpeed));
      panStart = { x: e.clientX, y: e.clientY };
      updateCameraPosition();
    }
  });

  window.addEventListener('mouseup', () => {
    isRotating = false;
    isPanning = false;
  });

  el.addEventListener('wheel', e => {
    spherical.radius *= e.deltaY > 0 ? 1.08 : 0.92;
    spherical.radius = Math.max(0.1, Math.min(500, spherical.radius));
    updateCameraPosition();
    e.preventDefault();
  }, { passive: false });

  el.addEventListener('contextmenu', e => e.preventDefault());
}

// ==================== STL PARSING ====================
function parseSTL(buffer) {
  const text = new TextDecoder('ascii').decode(new Uint8Array(buffer, 0, Math.min(80, buffer.byteLength)));
  if (text.startsWith('solid') && text.indexOf('facet') !== -1) {
    return parseASCIISTL(buffer);
  }
  // Check if truly binary: header 80 bytes + 4 bytes numTriangles
  if (buffer.byteLength > 84) {
    const view = new DataView(buffer);
    const numTri = view.getUint32(80, true);
    const expectedSize = 84 + numTri * 50;
    if (Math.abs(expectedSize - buffer.byteLength) <= 1) {
      return parseBinarySTL(buffer);
    }
  }
  // Fallback: try ASCII
  return parseASCIISTL(buffer);
}

function parseBinarySTL(buffer) {
  const view = new DataView(buffer);
  const numTriangles = view.getUint32(80, true);
  const triangles = [];

  for (let i = 0; i < numTriangles; i++) {
    const offset = 84 + i * 50;
    const nx = view.getFloat32(offset, true);
    const ny = view.getFloat32(offset + 4, true);
    const nz = view.getFloat32(offset + 8, true);

    const v1 = [view.getFloat32(offset + 12, true), view.getFloat32(offset + 16, true), view.getFloat32(offset + 20, true)];
    const v2 = [view.getFloat32(offset + 24, true), view.getFloat32(offset + 28, true), view.getFloat32(offset + 32, true)];
    const v3 = [view.getFloat32(offset + 36, true), view.getFloat32(offset + 40, true), view.getFloat32(offset + 44, true)];

    triangles.push({ normal: [nx, ny, nz], vertices: [v1, v2, v3] });
  }
  return triangles;
}

function parseASCIISTL(buffer) {
  const text = new TextDecoder().decode(buffer);
  const triangles = [];
  const facetRegex = /facet\s+normal\s+([\d.eE+\-]+)\s+([\d.eE+\-]+)\s+([\d.eE+\-]+)\s+outer\s+loop\s+vertex\s+([\d.eE+\-]+)\s+([\d.eE+\-]+)\s+([\d.eE+\-]+)\s+vertex\s+([\d.eE+\-]+)\s+([\d.eE+\-]+)\s+([\d.eE+\-]+)\s+vertex\s+([\d.eE+\-]+)\s+([\d.eE+\-]+)\s+([\d.eE+\-]+)\s+endloop\s+endfacet/gi;

  let match;
  while ((match = facetRegex.exec(text)) !== null) {
    triangles.push({
      normal: [parseFloat(match[1]), parseFloat(match[2]), parseFloat(match[3])],
      vertices: [
        [parseFloat(match[4]), parseFloat(match[5]), parseFloat(match[6])],
        [parseFloat(match[7]), parseFloat(match[8]), parseFloat(match[9])],
        [parseFloat(match[10]), parseFloat(match[11]), parseFloat(match[12])]
      ]
    });
  }
  return triangles;
}

// ==================== OBJECT SEPARATION (Union-Find) ====================
function separateObjects(triangles, tolerance) {
  const tol = tolerance || 0.001;
  const n = triangles.length;
  if (n === 0) return [];

  // Union-Find
  const parent = new Int32Array(n);
  const rank = new Int32Array(n);
  for (let i = 0; i < n; i++) parent[i] = i;

  function find(x) {
    while (parent[x] !== x) { parent[x] = parent[parent[x]]; x = parent[x]; }
    return x;
  }

  function union(a, b) {
    a = find(a); b = find(b);
    if (a === b) return;
    if (rank[a] < rank[b]) [a, b] = [b, a];
    parent[b] = a;
    if (rank[a] === rank[b]) rank[a]++;
  }

  // Spatial hashing for vertex matching
  const scale = 1.0 / tol;
  const vertexMap = new Map();

  function vertexKey(v) {
    const x = Math.round(v[0] * scale);
    const y = Math.round(v[1] * scale);
    const z = Math.round(v[2] * scale);
    return `${x},${y},${z}`;
  }

  // For robustness, check neighboring cells too
  function getKeys(v) {
    const x = v[0] * scale;
    const y = v[1] * scale;
    const z = v[2] * scale;
    const bx = Math.round(x), by = Math.round(y), bz = Math.round(z);
    return [`${bx},${by},${bz}`];
  }

  for (let i = 0; i < n; i++) {
    const tri = triangles[i];
    for (let vi = 0; vi < 3; vi++) {
      const keys = getKeys(tri.vertices[vi]);
      for (const key of keys) {
        if (vertexMap.has(key)) {
          const otherTriIndices = vertexMap.get(key);
          for (const j of otherTriIndices) {
            union(i, j);
          }
          otherTriIndices.push(i);
        } else {
          vertexMap.set(key, [i]);
        }
      }
    }

    // Report progress
    if (i % 10000 === 0) {
      updateProgress('Separating objects...', (i / n) * 100);
    }
  }

  // Group triangles by root
  const groups = new Map();
  for (let i = 0; i < n; i++) {
    const root = find(i);
    if (!groups.has(root)) groups.set(root, []);
    groups.get(root).push(triangles[i]);
  }

  // Sort by size descending
  const result = Array.from(groups.values()).sort((a, b) => b.length - a.length);
  return result;
}

// ==================== BUILD SCENE FROM SEPARATED OBJECTS ====================
function buildScene(objects) {
  // Clear existing
  while (meshGroup.children.length > 0) {
    const child = meshGroup.children[0];
    child.geometry.dispose();
    child.material.dispose();
    meshGroup.remove(child);
  }

  separatedObjects = objects;
  selectedIndices = new Set(objects.map((_, i) => i));

  objects.forEach((tris, idx) => {
    const geometry = new THREE.BufferGeometry();
    const vertices = new Float32Array(tris.length * 9);
    const normals = new Float32Array(tris.length * 9);

    for (let i = 0; i < tris.length; i++) {
      const t = tris[i];
      for (let v = 0; v < 3; v++) {
        vertices[i * 9 + v * 3] = t.vertices[v][0];
        vertices[i * 9 + v * 3 + 1] = t.vertices[v][1];
        vertices[i * 9 + v * 3 + 2] = t.vertices[v][2];
        normals[i * 9 + v * 3] = t.normal[0];
        normals[i * 9 + v * 3 + 1] = t.normal[1];
        normals[i * 9 + v * 3 + 2] = t.normal[2];
      }
    }

    geometry.setAttribute('position', new THREE.BufferAttribute(vertices, 3));
    geometry.setAttribute('normal', new THREE.BufferAttribute(normals, 3));

    // Recompute normals if they seem zero
    const testNorm = tris[0]?.normal;
    if (testNorm && testNorm[0] === 0 && testNorm[1] === 0 && testNorm[2] === 0) {
      geometry.computeVertexNormals();
    }

    const color = OBJECT_COLORS[idx % OBJECT_COLORS.length];
    const material = new THREE.MeshPhongMaterial({
      color: color,
      wireframe: showWireframe,
      flatShading: true,
      transparent: true,
      opacity: 1.0,
      side: THREE.DoubleSide
    });

    const mesh = new THREE.Mesh(geometry, material);
    meshGroup.add(mesh);
  });

  updateUI();
  resetCamera();
}

// ==================== UI ====================
function updateUI() {
  const list = document.getElementById('object-list');
  list.innerHTML = '';

  document.getElementById('obj-count').textContent = separatedObjects.length;
  document.getElementById('info-objs').textContent = separatedObjects.length;

  const totalTris = separatedObjects.reduce((sum, t) => sum + t.length, 0);
  document.getElementById('info-tris').textContent = totalTris.toLocaleString();

  separatedObjects.forEach((tris, idx) => {
    const item = document.createElement('div');
    item.className = 'object-item' + (highlightedIndex === idx ? ' highlighted' : '');

    const color = OBJECT_COLORS[idx % OBJECT_COLORS.length];
    const colorHex = '#' + color.toString(16).padStart(6, '0');

    const isChecked = selectedIndices.has(idx);

    item.innerHTML = `
      <div class="checkbox ${isChecked ? 'checked' : ''}" data-idx="${idx}"></div>
      <div class="color-dot" style="background:${colorHex}"></div>
      <div class="info">
        <div class="name">Object ${idx + 1}</div>
        <div class="meta">${tris.length.toLocaleString()} triangles</div>
      </div>
    `;

    item.addEventListener('mouseenter', () => highlightObject(idx));
    item.addEventListener('mouseleave', () => unhighlightObject(idx));
    item.querySelector('.checkbox').addEventListener('click', (e) => {
      e.stopPropagation();
      toggleSelection(idx);
    });
    item.addEventListener('click', () => toggleSelection(idx));

    list.appendChild(item);
  });

  const selCount = selectedIndices.size;
  document.getElementById('btn-export').disabled = selCount === 0;
  document.getElementById('btn-export-separate').disabled = selCount === 0;
  document.getElementById('status-left').textContent =
    `${separatedObjects.length} objects found / ${selCount} selected`;
}

function toggleSelection(idx) {
  if (selectedIndices.has(idx)) {
    selectedIndices.delete(idx);
  } else {
    selectedIndices.add(idx);
  }
  // Update mesh opacity
  meshGroup.children.forEach((mesh, i) => {
    mesh.material.opacity = selectedIndices.has(i) ? 1.0 : 0.2;
  });
  updateUI();
}

function highlightObject(idx) {
  highlightedIndex = idx;
  meshGroup.children.forEach((mesh, i) => {
    if (i === idx) {
      mesh.material.emissive = new THREE.Color(0x333333);
    }
  });
  // Update list item highlight
  document.querySelectorAll('.object-item').forEach((el, i) => {
    el.classList.toggle('highlighted', i === idx);
  });
}

function unhighlightObject(idx) {
  highlightedIndex = -1;
  meshGroup.children.forEach((mesh, i) => {
    mesh.material.emissive = new THREE.Color(0x000000);
  });
  document.querySelectorAll('.object-item').forEach(el => {
    el.classList.remove('highlighted');
  });
}

// ==================== EXPORT STL ====================
function trianglesToBinarySTL(trianglesArray) {
  const totalTris = trianglesArray.reduce((sum, t) => sum + t.length, 0);
  const bufferSize = 84 + totalTris * 50;
  const buffer = new ArrayBuffer(bufferSize);
  const view = new DataView(buffer);

  // Header (80 bytes)
  const header = 'STL Splitter Export';
  for (let i = 0; i < 80; i++) {
    view.setUint8(i, i < header.length ? header.charCodeAt(i) : 0);
  }

  // Triangle count
  view.setUint32(80, totalTris, true);

  let offset = 84;
  for (const tris of trianglesArray) {
    for (const tri of tris) {
      // Normal
      view.setFloat32(offset, tri.normal[0], true); offset += 4;
      view.setFloat32(offset, tri.normal[1], true); offset += 4;
      view.setFloat32(offset, tri.normal[2], true); offset += 4;
      // Vertices
      for (let v = 0; v < 3; v++) {
        view.setFloat32(offset, tri.vertices[v][0], true); offset += 4;
        view.setFloat32(offset, tri.vertices[v][1], true); offset += 4;
        view.setFloat32(offset, tri.vertices[v][2], true); offset += 4;
      }
      // Attribute byte count
      view.setUint16(offset, 0, true); offset += 2;
    }
  }

  return buffer;
}

function downloadBlob(buffer, filename) {
  const blob = new Blob([buffer], { type: 'application/octet-stream' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  a.click();
  URL.revokeObjectURL(url);
}

function exportSelected() {
  const selectedTris = [];
  separatedObjects.forEach((tris, idx) => {
    if (selectedIndices.has(idx)) selectedTris.push(tris);
  });
  if (selectedTris.length === 0) return;
  const baseName = currentFileName.replace(/\.stl$/i, '');
  const buffer = trianglesToBinarySTL(selectedTris);
  downloadBlob(buffer, `${baseName}_merged.stl`);
}

function exportSeparate() {
  const baseName = currentFileName.replace(/\.stl$/i, '');
  separatedObjects.forEach((tris, idx) => {
    if (!selectedIndices.has(idx)) return;
    const buffer = trianglesToBinarySTL([tris]);
    downloadBlob(buffer, `${baseName}_object${idx + 1}.stl`);
  });
}

// ==================== PROGRESS ====================
function showProgress(text, pct) {
  document.getElementById('progress-overlay').classList.remove('hidden');
  document.getElementById('progress-text').textContent = text;
  document.getElementById('progress-bar').style.width = pct + '%';
}

function updateProgress(text, pct) {
  document.getElementById('progress-text').textContent = text;
  document.getElementById('progress-bar').style.width = pct + '%';
}

function hideProgress() {
  document.getElementById('progress-overlay').classList.add('hidden');
}

// ==================== FILE LOADING ====================

// Shared core: parse buffer → separate → build scene
async function loadFromBuffer(buffer, fileName, sourceURL) {
  currentFileName = fileName;
  document.getElementById('info-file').textContent = fileName;
  document.getElementById('empty-state').classList.add('hidden');
  document.getElementById('viewport-controls').style.display = '';

  updateProgress('Parsing STL...', 30);
  await new Promise(r => setTimeout(r, 50));

  const triangles = parseSTL(buffer);
  updateProgress('Separating objects...', 50);
  await new Promise(r => setTimeout(r, 50));

  const tolerance = parseFloat(document.getElementById('tolerance-input').value) || 0.001;
  const objects = separateObjects(triangles, tolerance);
  updateProgress('Building scene...', 90);
  await new Promise(r => setTimeout(r, 50));

  buildScene(objects);
  hideProgress();

  // Update URL parameter (without reloading the page)
  // Store the sourceURL if provided (for URL loads), otherwise just the filename
  updateURLParam(sourceURL || fileName);
}

// Load from a local File object (drag-drop / file picker)
async function loadFile(file) {
  if (!file.name.toLowerCase().endsWith('.stl')) {
    alert('Please select an STL file.');
    return;
  }

  showProgress('Loading file...', 10);
  const buffer = await file.arrayBuffer();
  await loadFromBuffer(buffer, file.name);
}

// Load from a URL path (fetch over network)
async function loadFromURL(url) {
  const fileName = decodeURIComponent(url.split('/').pop().split('?')[0] || 'model.stl');

  showProgress(`Fetching ${fileName}...`, 5);
  document.getElementById('empty-state').classList.add('hidden');

  try {
    const response = await fetch(url);
    if (!response.ok) {
      throw new Error(`HTTP ${response.status}: ${response.statusText}`);
    }
    updateProgress('Downloading...', 15);
    const buffer = await response.arrayBuffer();
    await loadFromBuffer(buffer, fileName, url);
  } catch (err) {
    hideProgress();
    document.getElementById('empty-state').classList.remove('hidden');
    document.getElementById('status-left').textContent = `Load error: ${err.message}`;
    console.error('Failed to load STL from URL:', err);
    alert(`Failed to load STL file.\n\nURL: ${url}\nError: ${err.message}`);
  }
}

// Update the URL search parameter without page reload
function updateURLParam(fileName) {
  try {
    const url = new URL(window.location);
    url.searchParams.set('file', fileName);
    window.history.replaceState({}, '', url);
  } catch (e) {
    // Ignore if running from file:// protocol etc.
  }
}

// Check URL parameters on startup and auto-load if specified
function checkURLParams() {
  try {
    const params = new URLSearchParams(window.location.search);
    const fileParam = params.get('file');
    if (fileParam) {
      // Treat as a URL path to fetch
      loadFromURL(fileParam);
    }
  } catch (e) {
    console.warn('URL parameter check failed:', e);
  }
}

// ==================== DRAG & DROP ====================
function setupDragDrop() {
  const body = document.body;
  const overlay = document.getElementById('drop-overlay');

  let dragCounter = 0;

  body.addEventListener('dragenter', e => {
    e.preventDefault();
    dragCounter++;
    overlay.classList.add('visible', 'active');
  });

  body.addEventListener('dragleave', e => {
    e.preventDefault();
    dragCounter--;
    if (dragCounter <= 0) {
      dragCounter = 0;
      overlay.classList.remove('visible', 'active');
    }
  });

  body.addEventListener('dragover', e => {
    e.preventDefault();
  });

  body.addEventListener('drop', e => {
    e.preventDefault();
    dragCounter = 0;
    overlay.classList.remove('visible', 'active');

    const files = e.dataTransfer.files;
    if (files.length > 0) {
      loadFile(files[0]);
    }
  });
}

// ==================== EVENT LISTENERS ====================
document.getElementById('file-input').addEventListener('change', e => {
  if (e.target.files.length > 0) loadFile(e.target.files[0]);
});

document.getElementById('btn-select-all').addEventListener('click', () => {
  separatedObjects.forEach((_, i) => selectedIndices.add(i));
  meshGroup.children.forEach(m => { m.material.opacity = 1.0; });
  updateUI();
});

document.getElementById('btn-deselect-all').addEventListener('click', () => {
  selectedIndices.clear();
  meshGroup.children.forEach(m => { m.material.opacity = 0.2; });
  updateUI();
});

document.getElementById('btn-export').addEventListener('click', exportSelected);
document.getElementById('btn-export-separate').addEventListener('click', exportSeparate);

window.addEventListener('resize', handleResize);

// ==================== INIT ====================
initScene();
setupControls();
setupDragDrop();
checkURLParams();
</script>
